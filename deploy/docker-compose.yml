services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    environment:
      - RESTIC_HOST=jellyfin-manager
    ports:
      - "18080:18080"
    volumes:
      - ../data:/data
      - /srv/jellyfin:/srv/jellyfin
      - /root/.config/rclone:/root/.config/rclone
    restart: unless-stopped

  telegram_admin_bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    environment:
      - JM_MANAGER_URL=http://web:18080
    volumes:
      - ../data:/data
    depends_on:
      - web
    command: python -u -m jm_manager.telegram_admin_bot
    restart: unless-stopped

# Jellyfin 通过可达的 HTTP/HTTPS 地址接入（无需 docker network）。
# 在 Web 面板 `/settings` 中配置 Jellyfin Base URL / Admin API Key 即可。
